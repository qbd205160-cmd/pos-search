<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>نظام تتبع أجهزة POS</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'Tajawal',sans-serif;direction:rtl;min-height:100vh}
.hdr{background:linear-gradient(135deg,#0d1424,#111827);border-bottom:1px solid #1e293b;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.htitle{font-size:16px;font-weight:800;color:#f1f5f9}
.hsub{font-size:10px;color:#475569;margin-top:1px}
.wrap{max-width:840px;margin:0 auto;padding:20px 14px}
.sbar{background:#0d1424;border:1px solid #1e3a5f;border-radius:13px;padding:16px;margin-bottom:16px}
.slabel{font-size:11px;color:#475569;margin-bottom:6px}
.srow{display:flex;gap:8px}
.sinput{flex:1;padding:11px 14px;border-radius:8px;background:#060a12;border:1px solid #1e3a5f;color:#e2e8f0;font-size:15px;outline:none;font-family:'Tajawal',sans-serif;direction:rtl}
.sinput:focus{border-color:#3b82f6}
.sinput::placeholder{color:#334155}
.sbtn{padding:11px 20px;border-radius:8px;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.xbtn{padding:11px 14px;border-radius:8px;border:1px solid #1e3a5f;color:#64748b;font-size:13px;cursor:pointer;background:transparent;font-family:'Tajawal',sans-serif}
.lbar{margin-top:9px;padding:7px 12px;background:rgba(59,130,246,.07);border-radius:7px;border:1px solid rgba(59,130,246,.2);font-size:11px;color:#60a5fa;display:none;align-items:center;gap:6px}
.lbar.on{display:flex}
.stbar{background:#0d1424;border:1px solid #1e3a5f;border-radius:8px;padding:8px 14px;margin-bottom:14px;font-size:11px;color:#475569;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#22c55e;box-shadow:0 0 8px #22c55e}.dot.err{background:#ef4444}.dot.ld{background:#fbbf24;animation:pulse 1s infinite}
.sum-card{background:linear-gradient(135deg,#0d1a2e,#0a1520);border:1px solid #1e3a5f;border-radius:14px;padding:17px;margin-bottom:13px}
.sum-name{font-size:19px;font-weight:900;color:#f0f6fc;margin-bottom:11px}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin-bottom:10px}
.sf{background:#060a12;border:1px solid #1e293b;border-radius:8px;padding:8px 11px}
.sf.hi{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.3)}
.sf.hig{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3)}
.sf.hio{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.3)}
.sf.hir{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3)}
.sf.hip{background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.3)}
.sf-lbl{font-size:10px;color:#475569;margin-bottom:2px}
.sf-val{font-size:12px;color:#cbd5e1;word-break:break-all}
.sf-val.b{color:#60a5fa;font-weight:700}.sf-val.g{color:#4ade80;font-weight:700}.sf-val.o{color:#fb923c;font-weight:700}.sf-val.r{color:#f87171;font-weight:700}.sf-val.p{color:#c4b5fd;font-weight:700}
.nb{background:#060a12;border:1px solid #1e293b;border-radius:7px;padding:8px 11px;margin-top:5px}
.nl{font-size:10px;color:#475569;margin-bottom:2px}
.nt{font-size:11px;color:#cbd5e1;line-height:1.8}
.sec{font-size:11px;font-weight:700;padding:5px 10px;border-radius:7px;margin:11px 0 6px;display:flex;align-items:center;gap:5px}
.sec.blue{color:#60a5fa;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)}
.sec.purple{color:#c4b5fd;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2)}
.sec.green{color:#4ade80;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)}
.sec.orange{color:#fb923c;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2)}
.hbtn{width:100%;padding:7px;border-radius:8px;background:transparent;border:1px solid #1e3a5f;color:#475569;font-size:11px;cursor:pointer;font-family:'Tajawal',sans-serif;margin-bottom:6px}
.hi{background:#0d1424;border:1px solid #1e293b;border-radius:9px;margin-bottom:5px;padding:9px 12px}
.hr{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hn{font-size:11px;color:#64748b;margin-top:3px;line-height:1.6}
.brt{font-size:11px;color:#475569;margin:14px 0 7px;padding:6px 11px;background:#0d1424;border-radius:7px;border:1px solid #1e293b}
.bri{background:#0d1424;border:1px solid #1e293b;border-radius:10px;margin-bottom:6px;padding:10px 13px;cursor:pointer;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bri:active{border-color:#3b82f6;background:rgba(59,130,246,.06)}
.brn{font-size:13px;font-weight:700;color:#e2e8f0;flex:1}
.brm{font-size:10px;color:#475569}
.exp-btn{width:100%;padding:9px;border-radius:8px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);color:#4ade80;font-size:11px;cursor:pointer;font-family:'Tajawal',sans-serif;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:5px}
.bdg{padding:2px 8px;border-radius:11px;font-size:10px;font-weight:700}
.s-n{background:#0a2a1a;border:1px solid #1a6a3a;color:#4ade80}
.s-j{background:#0a1a2a;border:1px solid #1a4a8a;color:#60a5fa}
.s-w{background:#2a1a0a;border:1px solid #6a4a1a;color:#fbbf24}
.s-x{background:#1a1a2a;border:1px solid #3a3a5a;color:#94a3b8}
.empty{text-align:center;padding:44px 16px;background:#0d1424;border-radius:13px;border:1px dashed #1e3a5f}
.init{text-align:center;padding:44px 16px}
.hint{background:#0d1424;border:1px solid #1e3a5f;border-radius:8px;padding:10px 14px;font-size:11px;color:#475569;line-height:2;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sp{width:11px;height:11px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-left:4px}
@media(max-width:580px){.sum-grid{grid-template-columns:1fr 1fr}.hdr{padding:11px 13px}.wrap{padding:14px 10px}}</style>
</head>
<body>
<div class="hdr">
  <div class="logo">🖨</div>
  <div><div class="htitle">نظام تتبع أجهزة POS</div><div class="hsub">dashboard · TVF · stock · sim55</div></div>
  <div class="modes">
    <button class="mb on" onclick="setMode('r')" id="br">🏪 مطعم</button>
    <button class="mb" onclick="setMode('d')" id="bd">🖥️ جهاز</button>
    <button class="mb" onclick="setMode('s')" id="bs">📶 سيم</button>
    <button class="mb" onclick="showReports()" id="brep">📊 تقارير</button>
  </div>
</div>
<div class="wrap">
  <div class="stbar">
    <div class="dot ld" id="stDot"></div>
    <span id="stMsg">جاري تحميل البيانات...</span>
    <button onclick="loadAll()" style="margin-right:auto;padding:3px 9px;border-radius:5px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#60a5fa;font-size:10px;cursor:pointer;font-family:'Tajawal',sans-serif">🔄 تحديث</button>
  </div>
  <div id="reportsPage" style="display:none">
    <div class="sbar" style="margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:#60a5fa;margin-bottom:12px">📊 تقارير المطاعم</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div><div class="slabel">📊 الحالة</div><select id="repStatus" style="width:100%;padding:9px;border-radius:8px;background:#060a12;border:1px solid #1e3a5f;color:#e2e8f0;font-size:12px;font-family:'Tajawal',sans-serif"><option value="">الكل</option><option value="نشط">نشط</option><option value="جديد">جديد</option><option value="انتظار">انتظار</option><option value="مكتمل">مكتمل</option></select></div>
        <div><div class="slabel">👤 الفني</div><select id="repTech" style="width:100%;padding:9px;border-radius:8px;background:#060a12;border:1px solid #1e3a5f;color:#e2e8f0;font-size:12px;font-family:'Tajawal',sans-serif"><option value="">الكل</option></select></div>
        <div><div class="slabel">📅 من</div><input type="date" id="repFrom" style="width:100%;padding:9px;border-radius:8px;background:#060a12;border:1px solid #1e3a5f;color:#e2e8f0;font-size:12px"></div>
        <div><div class="slabel">📅 إلى</div><input type="date" id="repTo" style="width:100%;padding:9px;border-radius:8px;background:#060a12;border:1px solid #1e3a5f;color:#e2e8f0;font-size:12px"></div>
      </div>
      <input id="repSearch" placeholder="🔍 بحث في النتائج..." style="width:100%;padding:9px;border-radius:8px;background:#060a12;border:1px solid #1e3a5f;color:#e2e8f0;font-size:12px;font-family:'Tajawal',sans-serif;margin-bottom:10px" oninput="applyFilters()">
      <div style="display:flex;gap:8px">
        <button onclick="applyFilters()" style="flex:1;padding:9px;border-radius:8px;background:#3b82f6;border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif">🔍 تطبيق</button>
        <button onclick="resetFilters()" style="padding:9px 14px;border-radius:8px;background:transparent;border:1px solid #1e3a5f;color:#475569;font-size:12px;cursor:pointer;font-family:'Tajawal',sans-serif">↺</button>
        <button onclick="exportReport()" style="padding:9px 14px;border-radius:8px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;font-size:12px;cursor:pointer;font-family:'Tajawal',sans-serif">📥 CSV</button>
      </div>
    </div>
    <div id="repStats" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:14px"></div>
    <div id="repResults"></div>
  </div>
  <div class="sbar" id="mainSbar">
    <div class="slabel" id="slbl">🔍 ابحث — اسم مطعم، جهاز، سيم...</div>
    <div class="srow">
      <input class="sinput" id="si" placeholder="فولكينو | VS | VB53221 | 7873890..." onkeydown="if(event.key==='Enter')go()"/>
      <button class="sbtn" id="sbtn" onclick="go()">🔍 بحث</button>
      <button class="xbtn" onclick="document.getElementById('si').value=''">✕</button>
    </div>
    <div class="lbar" id="lb"><span class="sp"></span><span id="lmsg">جاري البحث...</span></div>
  </div>
  <div id="res">
    <div class="hint">
      <strong style="color:#60a5fa">أمثلة:</strong><br>
      🏪 <span style="color:#e2e8f0">فولكينو</span> أو <span style="color:#e2e8f0">هاديز</span><br>
      🖥️ كل VS: <span style="color:#e2e8f0">VS</span> | كل VB: <span style="color:#e2e8f0">VB</span><br>
      📶 سيم: <span style="color:#e2e8f0">7873890544</span>
    </div>
  </div>
</div>
<script>
var DASH='1TnlxGwD0G6FV654bFCbXmjL4Ek59IGJWkAYYlb_GD7w';
var TVF_ID='11iL-WTrWcw9hSn5YD6i1LvLnczMrFu0HInjXmBUCFmo';
var STOCK='1ZOB4rHFil99StMeaCPm59lDT4vnLkaksY2d-ZszC-t0';
var SIM55='1Fwyln1_-ogHjvfnoQnI2tdXTWGRosThZofgjWU2TSl8';
var FILE_ID='1m6AHs66KJ5RbvQUu5vvM0HGmNalMwElS7LBlk8yVEJA';

// كل بيانات المطاعم المجمعة من كل الشيتات
var RESTAURANTS={};// key=device, value={name,sim,email,status,date,tech,note,op,src}
var DB={dash:[],tvf5:[],tvf4:[],stock:[],sim55:[],file:[]};
var loaded=false;

// ── Load GViz ────────────────────────────────────────────────
async function gviz(id,sheet){
  var url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json'+(sheet?'&sheet='+encodeURIComponent(sheet):'');
  var r=await fetch(url);var t=await r.text();
  var j=JSON.parse(t.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
  var cols=j.table.cols.map(function(c){return(c.label||c.id||'').trim();});
  return(j.table.rows||[]).map(function(r){
    var o={_cols:cols};
    (r.c||[]).forEach(function(cell,i){
      o[cols[i]]=cell&&cell.v!=null?String(cell.v).trim():'';
    });
    return o;
  }).filter(function(r){return Object.values(r).some(function(v){return v&&v!=='_cols';});});
}

async function loadAll(){
  setStatus('ld','جاري تحميل البيانات...');
  try{
    setLMsg('تحميل dashboard...');
    var dash1=await gviz(DASH);
    var dash2=[];
    try{dash2=await gviz(DASH,'ورقة1');}catch(e){}
    DB.dash=dash1.concat(dash2);
    
    // تحميل كل شيتات TVF
    DB.tvf5=[];DB.tvf4=[];
    var tvfSheets=[
      {name:'Form Responses 1',type:'r5'},
      {name:'Form Responses 2',type:'r5'},
      {name:'Form Responses 4',type:'r4'},
      {name:'Sheet6',type:'r5'},
      {name:'Sheet7',type:'r5'},
      {name:'Sheet8',type:'r5'}
    ];
    for(var si2=0;si2<tvfSheets.length;si2++){
      setLMsg('تحميل TVF: '+tvfSheets[si2].name+'...');
      try{
        var rows=await gviz(TVF_ID,tvfSheets[si2].name);
        if(tvfSheets[si2].type==='r4'){DB.tvf4=DB.tvf4.concat(rows);}
        else{DB.tvf5=DB.tvf5.concat(rows);}
      }catch(e){}
    }
    
    setLMsg('تحميل stock...');
    try{DB.stock=await gviz(STOCK);}catch(e){DB.stock=[];}
    
    setLMsg('تحميل sim55...');
    try{DB.sim55=await gviz(SIM55);}catch(e){DB.sim55=[];}
    
    setLMsg('تحميل file (ICCID/MSISDN)...');
    try{DB.file=await gviz(FILE_ID);}catch(e){DB.file=[];}
    
    // بناء خريطة ICCID->MSISDN
    buildFileMap();
    // بناء قاعدة بيانات الأجهزة
    buildDeviceDB();
    
    loaded=true;
    var tvfTotal=DB.tvf5.length+DB.tvf4.length;
    setStatus('ok','جاهز — '+DB.dash.length+' dashboard · '+tvfTotal+' TVF · '+DB.stock.length+' stock · '+DB.sim55.length+' sim55 · '+DB.file.length+' file');
  }catch(e){setStatus('err','فشل: '+e.message);}
}

// ── Build ICCID->MSISDN lookup map ───────────────────────────
var ICCID_MAP={};
function buildFileMap(){
  ICCID_MAP={};
  DB.file.forEach(function(r){
    var iccid=String(cv(r,'ICCID')||'').replace(/\D/g,'').trim();
    var msisdn=String(cv(r,'MSISDN')||'').replace(/\D/g,'').trim();
    // Also handle NO_HEADER rows where col0=ICCID col1=MSISDN
    if(!iccid){
      var keys=Object.keys(r).filter(function(k){return k!=='_cols';});
      if(keys.length>=2){
        var v0=String(r[keys[0]]||'').replace(/\D/g,'');
        var v1=String(r[keys[1]]||'').replace(/\D/g,'');
        if(v0.length>10&&v1.length>=9&&v1.length<=12){iccid=v0;msisdn=v1;}
      }
    }
    if(iccid&&msisdn){
      ICCID_MAP[iccid]=msisdn;
      // Also map last 11 digits for partial matching
      if(iccid.length>11)ICCID_MAP[iccid.slice(-11)]=msisdn;
      if(iccid.length>9)ICCID_MAP[iccid.slice(-9)]=msisdn;
    }
  });
  console.log('ICCID map built:', Object.keys(ICCID_MAP).length, 'entries');
}

// Convert any number to MSISDN if it's an ICCID
function toMSISDN(val){
  if(!val)return val;
  var clean=String(val).replace(/\D/g,'');
  // If it's already a short number (MSISDN), return as-is
  if(clean.length<=12&&clean.length>=9)return clean;
  // If it's long (ICCID), look up MSISDN
  if(clean.length>12){
    if(ICCID_MAP[clean])return ICCID_MAP[clean];
    if(ICCID_MAP[clean.slice(-11)])return ICCID_MAP[clean.slice(-11)];
    if(ICCID_MAP[clean.slice(-9)])return ICCID_MAP[clean.slice(-9)];
  }
  return val; // return original if not found
}

// ── Build device database ─────────────────────────────────────
function buildDeviceDB(){
  RESTAURANTS={};
  
  // من dashboard
  DB.dash.forEach(function(r){
    var dev=cv(r,'رقم جهاز POS');
    if(dev&&dev.length>4&&/^v/i.test(dev)){
      var key=dev.toUpperCase();
      if(!RESTAURANTS[key]||pd(cv(r,'submittedAt'))>pd(RESTAURANTS[key].date)){
        RESTAURANTS[key]={
          dev:dev,
          name:cv(r,'اسم المطعم'),
          sim:cv(r,'رقم SIM كارت POS'),
          email:'',
          status:cv(r,'status'),
          date:cv(r,'submittedAt'),
          tech:cv(r,'اسم الموظف المسؤول'),
          note:cv(r,'ملاحظات'),
          op:cv(r,'سبب الزيارة'),
          addr:cv(r,'العنوان'),
          apps:cv(r,'منافس'),
          src:'dashboard',
          dashRow:r
        };
      }
    }
  });
  
  // من TVF شيت 4 (فيه اسم المطعم + POS number)
  DB.tvf4.forEach(function(r){
    var dev=cv(r,'POS number','Pos number','pos number');
    if(!dev)dev=findDevInRow(r);
    if(dev&&dev.length>4&&/^v/i.test(dev)){
      var key=dev.toUpperCase();
      var name=cv(r,'اسم المطعم');
      var sim=cv(r,'SIM number','Sim number','sim number');
      if(!RESTAURANTS[key]){
        RESTAURANTS[key]={dev:dev,name:name,sim:sim,email:'',status:'',date:cv(r,'كرل دايت'),tech:cv(r,'اسم الموظف'),note:cv(r,'ملاحظة'),op:'',addr:cv(r,'الموقع'),apps:cv(r,'المنافسين'),src:'TVF4',tvf4Row:r};
      } else {
        // أضف اسم المطعم إذا لم يكن موجوداً
        if(!RESTAURANTS[key].name&&name)RESTAURANTS[key].name=name;
        if(!RESTAURANTS[key].sim&&sim)RESTAURANTS[key].sim=sim;
        RESTAURANTS[key].tvf4Row=r;
      }
    }
  });
  
  // من TVF شيت 5
  DB.tvf5.forEach(function(r){
    var dev=cv(r,'رقم الجهاز');
    if(!dev)dev=findDevInRow(r);
    if(dev&&dev.length>4&&/^v/i.test(dev)){
      var key=dev.toUpperCase();
      if(!RESTAURANTS[key]){
        RESTAURANTS[key]={dev:dev,name:'',sim:cv(r,'رقم السم كارت'),email:'',status:'',date:cv(r,'Timestamp'),tech:cv(r,'اسم الوظف'),note:cv(r,'ملاحظة'),op:cv(r,'توزيع /راجاع'),addr:'',apps:'',pulled:cv(r,'اخراج صيانة'),src:'TVF5',tvf5Row:r};
      } else {
        RESTAURANTS[key].tvf5Row=r;
        if(!RESTAURANTS[key].sim)RESTAURANTS[key].sim=cv(r,'رقم السم كارت');
        if(cv(r,'اخراج صيانة'))RESTAURANTS[key].pulled=cv(r,'اخراج صيانة');
      }
    }
  });
  
  // من stock
  DB.stock.forEach(function(r){
    var dev=findDevInRow(r);
    if(dev&&dev.length>4&&/^v/i.test(dev)){
      var key=dev.toUpperCase();
      var name=cv(r,'REST NAME','rest name');
      var sim=cv(r,'MSISDN','msid');
      if(!RESTAURANTS[key]){
        RESTAURANTS[key]={dev:dev,name:name,sim:sim,email:cv(r,'email','EMAIL'),status:cv(r,'status'),date:'',tech:'',note:'',op:'',addr:'',apps:'',src:'stock',stockRow:r};
      } else {
        if(!RESTAURANTS[key].name&&name)RESTAURANTS[key].name=name;
        RESTAURANTS[key].stockRow=r;
        RESTAURANTS[key].stockStatus=cv(r,'status');
      }
    }
  });
  
  // من sim55 — ربط بالسيم
  DB.sim55.forEach(function(r){
    var sim5=ns(cv(r,'ارقام'));
    if(!sim5)return;
    // ابحث عن جهاز بنفس السيم
    Object.keys(RESTAURANTS).forEach(function(k){
      if(ns(RESTAURANTS[k].sim)===sim5){
        RESTAURANTS[k].sim5Row=r;
        RESTAURANTS[k].simStatus=cv(r,'الحالة');
        RESTAURANTS[k].simBlock=cv(r,'بلوك');
        if(!RESTAURANTS[k].name)RESTAURANTS[k].name=cv(r,'اسم المطعم');
        if(!RESTAURANTS[k].email)RESTAURANTS[k].email=cv(r,'الايميل');
      }
    });
  });
  
  console.log('Device DB built:', Object.keys(RESTAURANTS).length, 'devices');
}

function findDevInRow(r){
  var dev='';
  Object.values(r).forEach(function(v){
    if(v===null||v===undefined)return;
    v=String(v).trim();
    if(!dev&&v.length>4&&/^v[bse]/i.test(v))dev=v;
  });
  return dev;
}

// ── Helpers ───────────────────────────────────────────────────
// ── ICCID to MSISDN lookup ───────────────────────────────────
function iccidToMsisdn(iccid){
  if(!iccid)return '';
  iccid=String(iccid).replace(/\D/g,'');
  var last12=iccid.slice(-12);
  for(var i=0;i<DB.file.length;i++){
    var r=DB.file[i];
    var ic=String(cv(r,'ICCID')||'').replace(/\D/g,'');
    if(ic&&(ic===iccid||ic.slice(-12)===last12||iccid.slice(-12)===ic.slice(-12))){
      return cv(r,'MSISDN')||'';
    }
  }
  return '';
}

function msisdnFromAny(val){
  // If val looks like ICCID (>12 digits), convert to MSISDN
  if(!val)return val;
  var clean=String(val).replace(/\D/g,'');
  if(clean.length>12){
    var msisdn=iccidToMsisdn(clean);
    if(msisdn)return msisdn;
  }
  return val;
}

function cv(r){
  for(var i=1;i<arguments.length;i++){
    var k=arguments[i];
    if(r&&r[k]!==undefined&&r[k]!=='')return r[k];
  }
  return '';
}
function nd(d){return(d||'').toLowerCase().replace(/[\s\-]/g,'');}
function ns(s){return(s||'').replace(/\s/g,'').replace(/^00964/,'').replace(/^964/,'').replace(/^0/,'').slice(-9);}
function pd(s){
  if(!s)return new Date(0);
  s=String(s);
  var ar={'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
  s=s.replace(/[٠-٩]/g,function(d){return ar[d];}).replace(/‏/g,'').replace(/[،,]/g,' ').trim();
  var m=s.match(/(\d+)\/(\d+)\/(\d+)/);if(!m)return new Date(0);
  var t=s.match(/(\d+):(\d+)/),h=t?parseInt(t[1]):0,mn=t?parseInt(t[2]):0;
  var y=parseInt(m[3]),mo=parseInt(m[2]),d=parseInt(m[1]);
  if(y<100){var tmp=y;y=d;d=tmp;}
  if(s.includes('م')&&h<12)h+=12;if(s.includes('ص')&&h===12)h=0;
  return new Date(y,mo-1,d,h,mn);
}
function scBdg(s){var m={'نشط':'s-n','جديد':'s-j','انتظار':'s-w','مكتمل':'s-n','Active':'s-n','active':'s-n','live':'s-n'};return m[s]||'s-x';}
function vi(r){r=r||'';return r.includes('صيانة')?'🔧':r.includes('توزيع')?'📦':r.includes('تعويض')||r.includes('تبديل')?'🔄':r.includes('جديد')?'🆕':r.includes('راجع')||r.includes('رجع')?'↩️':r.includes('استعلام')?'❓':'📋';}
function setStatus(s,m){var d=document.getElementById('stDot');d.className='dot '+(s==='ok'?'ok':s==='err'?'err':'ld');document.getElementById('stMsg').textContent=m;}
function setLMsg(m){document.getElementById('lmsg').textContent=m;}

// ── Smart score ───────────────────────────────────────────────
function smartScore(name,q){
  name=(name||'').toLowerCase().replace(/\s+/g,' ').trim();
  q=(q||'').toLowerCase().replace(/\s+/g,' ').trim();
  if(!name||!q)return 0;
  if(name===q)return 1.0;
  if(name.includes(q))return 0.95;
  if(q.includes(name))return 0.85;
  var qw=q.split(' ').filter(function(w){return w.length>0;});
  if(qw.length>1&&qw.every(function(w){return name.includes(w);}))return 0.92;
  var mc=qw.filter(function(w){return name.includes(w);}).length;
  if(mc===0){
    var sim=0;
    for(var i=0;i<Math.min(q.length,name.length);i++){if(name.includes(q.substring(0,i+1)))sim=i+1;}
    if(sim>=3)return 0.5*(sim/q.length);
    return 0;
  }
  if(qw.length===1)return 0.80;
  if(qw.length>=2&&mc===1)return 0.35;
  return 0.65*(mc/qw.length);
}

// ── Search ────────────────────────────────────────────────────
function go(){
  var q=(document.getElementById('si').value||'').trim();
  if(!q)return;
  if(!loaded){loadAll().then(function(){if(loaded)go();});return;}
  showLoad(true);
  setTimeout(function(){search(q);showLoad(false);},10);
}

function search(q){
  var ql=q.toLowerCase().trim();
  
  // هل هو prefix جهاز؟ vs/vb/ve فقط
  var isDevPrefix=/^v[bse]$/i.test(ql);
  // هل هو رقم جهاز كامل؟
  var isDevFull=/^v[bse]/i.test(ql)&&ql.length>4;
  // هل هو ICCID (أكثر من 12 رقم)؟
  var cleanNum=ql.replace(/[^0-9]/g,'');
  var isICCID=cleanNum.length>12;
  // هل هو رقم سيم؟
  var isSimNum=!isICCID&&/^[0-9]{7,}$/.test(cleanNum)&&cleanNum.length>=9;
  
  if(isDevPrefix){
    searchByPrefix(ql);
  } else if(isDevFull){
    searchByDevice(ql);
  } else if(isICCID){
    // ICCID - convert to MSISDN
    searchBySim(cleanNum);
  } else if(isSimNum){
    searchBySim(ql);
  } else {
    searchByName(q);
  }
}

// ── Search by prefix (vs/vb/ve) ───────────────────────────────
function searchByPrefix(prefix){
  var matched=[];
  var seen={};
  
  // من RESTAURANTS database
  Object.keys(RESTAURANTS).forEach(function(k){
    if(k.toLowerCase().startsWith(prefix)&&!seen[k]){
      seen[k]=true;
      matched.push(RESTAURANTS[k]);
    }
  });
  
  // من TVF5 مباشرة (قد لا يكون في RESTAURANTS)
  DB.tvf5.forEach(function(r){
    var dev=findDevInRow(r);
    if(dev&&dev.toLowerCase().startsWith(prefix)&&!seen[dev.toUpperCase()]){
      seen[dev.toUpperCase()]=true;
      matched.push({dev:dev,name:cv(r,'اسم الوظف'),sim:cv(r,'رقم السم كارت'),date:cv(r,'Timestamp'),op:cv(r,'توزيع /راجاع'),note:cv(r,'ملاحظة'),pulled:cv(r,'اخراج صيانة'),src:'TVF5',tvf5Row:r});
    }
  });
  
  // من TVF4
  DB.tvf4.forEach(function(r){
    var dev=cv(r,'POS number')||findDevInRow(r);
    if(dev&&dev.toLowerCase().startsWith(prefix)&&!seen[dev.toUpperCase()]){
      seen[dev.toUpperCase()]=true;
      matched.push({dev:dev,name:cv(r,'اسم المطعم'),sim:cv(r,'SIM number'),date:cv(r,'كرل دايت'),op:'',note:cv(r,'ملاحظة'),src:'TVF4',tvf4Row:r});
    }
  });
  
  // من stock
  DB.stock.forEach(function(r){
    var dev=findDevInRow(r);
    if(dev&&dev.toLowerCase().startsWith(prefix)&&!seen[dev.toUpperCase()]){
      seen[dev.toUpperCase()]=true;
      matched.push({dev:dev,name:cv(r,'REST NAME','rest name'),sim:cv(r,'MSISDN','msid'),status:cv(r,'status'),src:'stock',stockRow:r});
    }
  });
  
  if(!matched.length){noRes(prefix);return;}
  
  // Sort by date desc
  matched.sort(function(a,b){return pd(b.date||'')-pd(a.date||'');});
  
  renderDeviceList(matched,prefix);
}

// ── Search by full device number ──────────────────────────────
function searchByDevice(q){
  var ql=nd(q);
  var info=RESTAURANTS[q.toUpperCase()];
  
  // كل سجلات TVF5 لهذا الجهاز
  var tvf5Records=DB.tvf5.filter(function(r){
    var d=nd(findDevInRow(r)||cv(r,'رقم الجهاز'));
    return d&&d.includes(ql);
  }).sort(function(a,b){return pd(cv(b,'Timestamp'))-pd(cv(a,'Timestamp'));});
  
  // كل سجلات TVF4
  var tvf4Records=DB.tvf4.filter(function(r){
    var d=nd(cv(r,'POS number')||findDevInRow(r));
    return d&&d.includes(ql);
  });
  
  // dashboard
  var dashRecords=DB.dash.filter(function(r){
    return nd(cv(r,'رقم جهاز POS')).includes(ql);
  }).sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});
  
  // stock
  var stockRecord=DB.stock.filter(function(r){
    return nd(findDevInRow(r)).includes(ql);
  })[0];
  
  if(!tvf5Records.length&&!tvf4Records.length&&!dashRecords.length&&!stockRecord){noRes(q);return;}
  
  var name=dashRecords.length?cv(dashRecords[0],'اسم المطعم'):tvf4Records.length?cv(tvf4Records[0],'اسم المطعم'):info?info.name:'';
  var sim=dashRecords.length?cv(dashRecords[0],'رقم SIM كارت POS'):tvf5Records.length?cv(tvf5Records[0],'رقم السم كارت'):'';
  
  var br={
    name:name||q,
    dev:q,
    sim:sim,
    dash:dashRecords,
    tvf5:tvf5Records,
    tvf4:tvf4Records,
    stockRow:stockRecord||null,
    sim5Row:info?info.sim5Row:null
  };
  
  renderSingleDevice(br);
}

// ── Search by SIM ─────────────────────────────────────────────
function searchBySim(q){
  // Convert ICCID to MSISDN if needed
  var cleanQ=String(q).replace(/[^0-9]/g,'');
  if(cleanQ.length>12){
    var msisdn=toMSISDN(cleanQ);
    if(msisdn&&msisdn!==cleanQ){
      document.getElementById('si').value=msisdn;
      searchBySim(msisdn);
      return;
    }
  }
  var nq=ns(q);
  var dashR=DB.dash.filter(function(r){return ns(cv(r,'رقم SIM كارت POS'))===nq;}).sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});
  var tvf5R=DB.tvf5.filter(function(r){return ns(cv(r,'رقم السم كارت'))===nq;}).sort(function(a,b){return pd(cv(b,'Timestamp'))-pd(cv(a,'Timestamp'));});
  var tvf4R=DB.tvf4.filter(function(r){return ns(cv(r,'SIM number'))===nq;});
  var sim5R=DB.sim55.filter(function(r){return ns(cv(r,'ارقام'))===nq;});
  if(!dashR.length&&!tvf5R.length&&!tvf4R.length&&!sim5R.length){noRes(q);return;}
  var name=dashR.length?cv(dashR[0],'اسم المطعم'):tvf4R.length?cv(tvf4R[0],'اسم المطعم'):sim5R.length?cv(sim5R[0],'اسم المطعم'):'';
  renderSingleDevice({name:name||q,dev:dashR.length?cv(dashR[0],'رقم جهاز POS'):'',sim:q,dash:dashR,tvf5:tvf5R,tvf4:tvf4R,stockRow:null,sim5Rows:sim5R});
}

// ── Search by restaurant name ─────────────────────────────────
function searchByName(q){
  var byName={};
  
  function add(name,src,row){
    var sc=smartScore(name,q);
    if(sc<=0.3)return;
    if(!byName[name])byName[name]={name:name,sc:sc,dash:[],tvf5:[],tvf4:[],stock:[],sim:[]};
    byName[name][src].push(row);
    if(sc>byName[name].sc)byName[name].sc=sc;
  }
  
  DB.dash.forEach(function(r){var n=cv(r,'اسم المطعم');if(n)add(n,'dash',r);});
  DB.tvf4.forEach(function(r){var n=cv(r,'اسم المطعم');if(n)add(n,'tvf4',r);});
  DB.sim55.forEach(function(r){var n=cv(r,'اسم المطعم');if(n)add(n,'sim',r);});
  DB.stock.forEach(function(r){var n=cv(r,'REST NAME','rest name');if(n)add(n,'stock',r);});
  
  if(!Object.keys(byName).length){noRes(q);return;}
  
  var branches=Object.values(byName).sort(function(a,b){return b.sc-a.sc;});
  var best=branches[0].sc;
  var thr=Math.max(0.5,best*0.78);
  branches=branches.filter(function(b){return b.sc>=thr;});
  
  // إضافة TVF5 عبر رقم الجهاز
  branches.forEach(function(br){
    br.dash.sort(function(a,b){return pd(String(cv(b,'submittedAt')))-pd(String(cv(a,'submittedAt')));});
    var devs={},sims={};
    br.dash.forEach(function(t){
      var d=nd(cv(t,'رقم جهاز POS'));if(d&&d.length>4)devs[d]=true;
      var s=ns(cv(t,'رقم SIM كارت POS'));if(s&&s.length>6)sims[s]=true;
    });
    br.tvf4.forEach(function(t){
      var d=nd(cv(t,'POS number')||findDevInRow(t));if(d&&d.length>4)devs[d]=true;
      var s=ns(cv(t,'SIM number'));if(s&&s.length>6)sims[s]=true;
    });
    br.tvf5=DB.tvf5.filter(function(r){
      var d=nd(findDevInRow(r)||cv(r,'رقم الجهاز'));
      return d&&devs[d];
    }).sort(function(a,b){return pd(cv(b,'Timestamp'))-pd(cv(a,'Timestamp'));});
    DB.stock.forEach(function(r){var d=nd(findDevInRow(r));if(d&&devs[d]&&!br.stock.find(function(x){return x===r;}))br.stock.push(r);});
    DB.sim55.forEach(function(r){var s=ns(cv(r,'ارقام'));if(s&&sims[s]&&!br.sim.find(function(x){return x===r;}))br.sim.push(r);});
  });
  
  renderBranches(branches);
}

function downloadCSV(rows,name){
  var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){return'"'+(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download=name;a.click();
}

var repData=[];

function showReports(){
  // Hide main search

  document.getElementById('reportsPage').style.display='none';
  document.getElementById('res').style.display='block';

}

function buildFilterOptions(){
  // Build unique values for filters
  var techs=new Set(),areas=new Set(),reasons=new Set(),apps=new Set();
  DB.dash.forEach(function(r){
    var t=cv(r,'اسم الموظف المسؤول');if(t&&t.length>1)techs.add(t);
    var a=cv(r,'العنوان');
    if(a){
      // Extract area from address (first word usually)
      var parts=a.split(' ');
      if(parts.length>1&&parts[0].length>2)areas.add(parts[0]+' '+parts[1]);
      else if(parts[0].length>2)areas.add(parts[0]);
    }
    var rs=cv(r,'سبب الزيارة');if(rs&&rs.length>1)reasons.add(rs);
    var ap=cv(r,'منافس');if(ap&&ap!=='—'&&ap.length>1)ap.split(',').forEach(function(x){if(x.trim())apps.add(x.trim());});
  });
  
  function fillSelect(id,values){
    var sel=document.getElementById(id);
    var cur=sel.value;
    sel.innerHTML='<option value="">الكل</option>';
    Array.from(values).sort().forEach(function(v){
      sel.innerHTML+='<option value="'+v+'">'+v+'</option>';
    });
    sel.value=cur;
  }
  
  fillSelect('repTech',techs);
  fillSelect('repArea',areas);
  fillSelect('repReason',reasons);
  fillSelect('repApp',apps);
}

function applyFilters(){
  if(!loaded)return;
  
  var status=document.getElementById('repStatus').value;
  var tech=document.getElementById('repTech').value;
  var area=document.getElementById('repArea').value;
  var reason=document.getElementById('repReason').value;
  var app=document.getElementById('repApp').value;
  var simSt=document.getElementById('repSimSt').value;
  var fromDate=document.getElementById('repFrom').value;
  var toDate=document.getElementById('repTo').value;
  var search=(document.getElementById('repSearch').value||'').toLowerCase();
  
  // Get latest task per restaurant
  var byRest={};
  DB.dash.forEach(function(r){
    var name=cv(r,'اسم المطعم');
    if(!name)return;
    if(!byRest[name]||pd(cv(r,'submittedAt'))>pd(cv(byRest[name],'submittedAt'))){
      byRest[name]=r;
    }
  });
  
  var rows=Object.values(byRest);
  
  // Apply filters
  rows=rows.filter(function(r){
    if(status&&cv(r,'status')!==status)return false;
    if(tech&&cv(r,'اسم الموظف المسؤول')!==tech)return false;
    if(area&&!cv(r,'العنوان').includes(area))return false;
    if(reason&&cv(r,'سبب الزيارة')!==reason)return false;
    if(app&&!cv(r,'منافس').includes(app))return false;
    if(simSt&&cv(r,'حالة SIM')!==simSt)return false;
    if(fromDate){var d=pd(cv(r,'submittedAt'));if(d<new Date(fromDate))return false;}
    if(toDate){var d=pd(cv(r,'submittedAt'));if(d>new Date(toDate+'T23:59:59'))return false;}
    if(search){
      var all=Object.values(r).join(' ').toLowerCase();
      if(!all.includes(search))return false;
    }
    return true;
  });
  
  // Sort newest first
  rows.sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});
  
  repData=rows;
  renderReportStats(rows);
  renderReportTable(rows);
}

function renderReportStats(rows){
  var stats={total:rows.length,active:0,waiting:0,new_:0,done:0};
  rows.forEach(function(r){
    var s=cv(r,'status');
    if(s==='نشط')stats.active++;
    else if(s==='انتظار')stats.waiting++;
    else if(s==='جديد')stats.new_++;
    else if(s==='مكتمل')stats.done++;
  });
  
  var h='';
  h+=statCard('📊','إجمالي',stats.total,'#60a5fa');
  h+=statCard('✅','نشط',stats.active,'#4ade80');
  h+=statCard('⏳','انتظار',stats.waiting,'#fbbf24');
  h+=statCard('🆕','جديد',stats.new_,'#93c5fd');
  h+=statCard('✔️','مكتمل',stats.done,'#86efac');
  document.getElementById('repStats').innerHTML=h;
}

    +'<div style="font-size:18px">'+ico+'</div>'
    +'<div style="font-size:20px;font-weight:900;color:'+color+'">'+val+'</div>'
    +'<div style="font-size:10px;color:#475569">'+lbl+'</div>'
    +'</div>';
}

  }
  
  var h='<div style="font-size:11px;color:#475569;margin-bottom:8px">'+rows.length+' مطعم</div>';
  
  rows.forEach(function(r,i){

    var sim=cv(r,'رقم SIM كارت POS');
    var status=cv(r,'status');
    var date=cv(r,'submittedAt');
    var tech=cv(r,'اسم الموظف المسؤول');
    var addr=cv(r,'العنوان');
    var reason=cv(r,'سبب الزيارة');
    var simst=cv(r,'حالة SIM');
    var apps=cv(r,'منافس');
    var note=cv(r,'ملاحظات');
    var id=cv(r,'id');
    
    h+='<div class="hi" style="margin-bottom:7px;cursor:pointer" onclick="this.querySelector('.rep-detail').style.display=this.querySelector('.rep-detail').style.display==='none'?'block':'none'">'
     +'<div class="hr">'
     +'<span style="font-size:11px;color:#334155;min-width:24px">'+( i+1)+'</span>'
     +'<span style="font-size:13px;font-weight:700;color:#e2e8f0;flex:1">'+name+'</span>'
     +(dev&&['1','2','3'].indexOf(dev)<0?'<span style="font-size:10px;color:#60a5fa">🖥️ '+dev+'</span>':'')
     +'<span class="bdg '+scBdg(status)+'">'+status+'</span>'
     +'</div>'
     +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">'
     +(addr?'<span style="font-size:10px;color:#475569">📍 '+addr+'</span>':'')
     +(date?'<span style="font-size:10px;color:#475569">📅 '+date+'</span>':'')
     +(tech?'<span style="font-size:10px;color:#475569">👤 '+tech+'</span>':'')
     +'</div>'
     +'<div class="rep-detail" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid #1e293b">'
     +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">'
     +(reason?'<div><span style="color:#475569">🔧 </span><span style="color:#7dd3fc">'+reason+'</span></div>':'')
     +(sim&&sim.length>5?'<div><span style="color:#475569">📶 </span><span style="color:#fb923c">'+sim+'</span></div>':'')
     +(simst?'<div><span style="color:#475569">📡 </span><span style="color:'+(simst==='4G'?'#4ade80':'#f87171')+'">'+simst+'</span></div>':'')
     +(apps&&apps!=='—'?'<div><span style="color:#475569">📱 </span><span style="color:#c4b5fd">'+apps+'</span></div>':'')
     +(id?'<div style="grid-column:1/-1"><span style="color:#334155">🆔 '+id+'</span></div>':'')
     +(note&&note!=='—'?'<div style="grid-column:1/-1"><span style="color:#475569">📝 </span><span style="color:#94a3b8">'+note+'</span></div>':'')
     +'</div></div>'
     +'</div>';
  });
  
  document.getElementById('repResults').innerHTML=h;
}

function resetFilters(){
  ['repStatus','repTech','repArea','repReason','repApp','repSimSt'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('repFrom').value='';
  document.getElementById('repTo').value='';
  document.getElementById('repSearch').value='';
  applyFilters();
}

function exportReport(){
  if(!repData.length)return;
  var rows=[['اسم المطعم','رقم الجهاز','رقم السيم','العنوان','الحالة','سبب الزيارة','حالة السيم','الفني','آخر تاسك','المنافسين','ملاحظات','ID']];
  repData.forEach(function(r){
    rows.push([
      cv(r,'اسم المطعم'),cv(r,'رقم جهاز POS'),cv(r,'رقم SIM كارت POS'),
      cv(r,'العنوان'),cv(r,'status'),cv(r,'سبب الزيارة'),cv(r,'حالة SIM'),
      cv(r,'اسم الموظف المسؤول'),cv(r,'submittedAt'),cv(r,'منافس'),cv(r,'ملاحظات'),cv(r,'id')
    ]);
  });
  downloadCSV(rows,'تقرير_المطاعم_'+new Date().toLocaleDateString('ar')+'.csv');
}
loadAll();
</script>
