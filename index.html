<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام تتبع أجهزة POS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090f;color:#e2e8f0;font-family:'Tajawal',sans-serif;direction:rtl;min-height:100vh}
.hdr{background:linear-gradient(135deg,#0d1424,#111827);border-bottom:1px solid #1e293b;padding:16px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(59,130,246,.35);flex-shrink:0}
.htitle{font-size:17px;font-weight:800;color:#f1f5f9}
.hsub{font-size:11px;color:#475569;margin-top:1px}
.modes{margin-right:auto;display:flex;gap:5px;flex-wrap:wrap}
.mb{padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid #1e293b;background:transparent;color:#475569;font-family:'Tajawal',sans-serif;transition:all .15s}
.mb.on{background:rgba(59,130,246,.18);border-color:#3b82f6;color:#93c5fd}
.wrap{max-width:820px;margin:0 auto;padding:28px 16px}
.sbar{background:#0d1424;border:1px solid #1e3a5f;border-radius:14px;padding:20px;margin-bottom:22px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.slabel{font-size:11px;color:#475569;margin-bottom:8px}
.srow{display:flex;gap:9px}
.sinput{flex:1;padding:12px 15px;border-radius:9px;background:#060a12;border:1px solid #1e3a5f;color:#e2e8f0;font-size:15px;outline:none;font-family:'Tajawal',sans-serif;direction:rtl;transition:border-color .2s}
.sinput:focus{border-color:#3b82f6}
.sinput::placeholder{color:#334155}
.sbtn{padding:12px 22px;border-radius:9px;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;background:linear-gradient(135deg,#3b82f6,#1d4ed8);box-shadow:0 0 16px rgba(59,130,246,.4);transition:all .2s}
.sbtn:disabled{background:#1e3a5f;box-shadow:none;cursor:not-allowed}
.lbar{margin-top:12px;padding:9px 13px;background:rgba(59,130,246,.07);border-radius:7px;border:1px solid rgba(59,130,246,.2);font-size:12px;color:#60a5fa;display:none;align-items:center;gap:7px}
.lbar.on{display:flex}
.stbar{background:#0d1424;border:1px solid #1e3a5f;border-radius:9px;padding:10px 16px;margin-bottom:18px;font-size:12px;color:#475569;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#22c55e;box-shadow:0 0 8px #22c55e}
.dot.err{background:#ef4444}
.dot.ld{background:#fbbf24;animation:pulse 1s infinite}
.sumbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:9px 14px;background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);border-radius:9px;font-size:12px;color:#60a5fa;flex-wrap:wrap}
.card{background:#0d1424;border:1px solid #1e3a5f;border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:0 3px 20px rgba(0,0,0,.4)}
.card.tvf-card{border-color:rgba(139,92,246,.3)}
.ch{padding:13px 18px;background:linear-gradient(90deg,rgba(59,130,246,.12),transparent);border-bottom:1px solid #1e3a5f;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ch.tvf{background:linear-gradient(90deg,rgba(139,92,246,.1),transparent);border-bottom-color:rgba(139,92,246,.2)}
.cname{font-size:15px;font-weight:800;color:#f1f5f9}
.cmeta{font-size:11px;color:#475569;margin-top:2px}
.bdgs{display:flex;gap:6px;flex-wrap:wrap;margin-right:auto}
.bdg{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:700}
.bnew{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
.btvf{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);color:#c4b5fd}
.bold{background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.25);color:#fb923c}
.vb{padding:8px 18px;background:rgba(59,130,246,.05);border-bottom:1px solid #1e293b;font-size:12px;color:#7dd3fc}
.grid{padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ib{background:#060a12;border:1px solid #1e293b;border-radius:8px;padding:8px 11px}
.ib.hl{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.3)}
.ib.hlp{background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.3)}
.ib.s2{grid-column:1/-1}
.il{font-size:10px;color:#475569;margin-bottom:3px}
.iv{font-size:13px;color:#cbd5e1;word-break:break-all}
.iv.b{color:#60a5fa;font-weight:700}.iv.p{color:#c4b5fd;font-weight:700}.iv.g{color:#4ade80}.iv.r{color:#f87171}.iv.y{color:#fbbf24}
.nb{margin:0 18px 14px;padding:10px 13px;background:#060a12;border-radius:8px;border:1px solid #1e293b}
.nl{font-size:10px;color:#475569;margin-bottom:4px}
.nt{font-size:12px;color:#cbd5e1;line-height:1.8}
.cf{padding:8px 18px;border-top:1px solid #0f172a;font-size:10px;color:#334155}
.sec{font-size:12px;font-weight:700;margin:16px 0 10px;padding:6px 12px;border-radius:8px;display:flex;align-items:center;gap:6px}
.sec.blue{color:#60a5fa;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)}
.sec.purple{color:#c4b5fd;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2)}
.hbtn{width:100%;padding:8px;border-radius:9px;background:transparent;border:1px solid #1e3a5f;color:#475569;font-size:12px;cursor:pointer;font-family:'Tajawal',sans-serif;margin-bottom:8px;transition:all .15s}
.hi{background:#0d1424;border:1px solid #1e293b;border-radius:10px;margin-bottom:7px;padding:10px 14px}
.hr2{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hno{font-size:11px;color:#64748b;margin-top:5px;line-height:1.7}
.empty{text-align:center;padding:50px 20px;background:#0d1424;border-radius:14px;border:1px dashed #1e3a5f}
.errbox{background:#1a0808;border:1px solid #5a1414;border-radius:11px;padding:13px 16px;margin-bottom:18px;color:#f87171;font-size:13px;display:none}
.init{text-align:center;padding:56px 20px}
.s-n{background:#0a2a1a;border:1px solid #1a6a3a;color:#4ade80}
.s-j{background:#0a1a2a;border:1px solid #1a4a8a;color:#60a5fa}
.s-w{background:#2a1a0a;border:1px solid #6a4a1a;color:#fbbf24}
.s-x{background:#1a1a2a;border:1px solid #3a3a5a;color:#94a3b8}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sp{width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-left:5px}
@media(max-width:580px){.grid{grid-template-columns:1fr}.hdr{padding:12px 14px}.wrap{padding:18px 10px}.modes{width:100%}}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">🖨</div>
  <div><div class="htitle">نظام تتبع أجهزة POS</div><div class="hsub">dashboard · Technical Visit Form · stock · sim 55</div></div>
  <div class="modes">
    <button class="mb on" onclick="setMode('r')" id="br">🏪 مطعم</button>
    <button class="mb" onclick="setMode('d')" id="bd">🖥️ جهاز</button>
    <button class="mb" onclick="setMode('s')" id="bs">📶 سيم</button>
  </div>
</div>
<div class="wrap">
  <div class="stbar">
    <div class="dot ld" id="stDot"></div>
    <span id="stMsg">جاري تحميل البيانات...</span>
    <button onclick="loadAll()" style="margin-right:auto;padding:3px 10px;border-radius:5px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#60a5fa;font-size:10px;cursor:pointer;font-family:'Tajawal',sans-serif">🔄 تحديث</button>
  </div>
  <div class="sbar">
    <div class="slabel" id="slbl">🏪 اسم المطعم — يبحث في جميع الشيتات</div>
    <div class="srow">
      <input class="sinput" id="si" placeholder="مثال: دجاج ابو غيث، فايكنك..." onkeydown="if(event.key==='Enter')go()"/>
      <button class="sbtn" id="sbtn" onclick="go()">🔍 بحث</button>
    </div>
    <div class="lbar" id="lb"><span class="sp"></span><span id="lmsg">جاري البحث...</span></div>
  </div>
  <div class="errbox" id="eb"></div>
  <div id="res"><div class="init">
    <div style="font-size:50px;margin-bottom:14px">🖨️</div>
    <div style="font-size:14px;color:#334155;margin-bottom:6px">ابحث عن أي مطعم أو جهاز أو سيم</div>
    <div style="font-size:11px;color:#1e293b">يبحث في dashboard + Technical Visit Form + stock + sim55</div>
  </div></div>
</div>
<script>
var DASH='1TnlxGwD0G6FV654bFCbXmjL4Ek59IGJWkAYYlb_GD7w';
var TVF='11iL-WTrWcw9hSn5YD6i1LvLnczMrFu0HInjXmBUCFmo';
var STOCK='1ZOB4rHFil99StMeaCPm59lDT4vnLkaksY2d-ZszC-t0';
var SIM55='1Fwyln1_-ogHjvfnoQnI2tdXTWGRosThZofgjWU2TSl8';
var DB={dash:[],tvf:[],stock:[],sim55:[]},loaded=false,mode='r';
async function gviz(id){var url='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json';var r=await fetch(url);var t=await r.text();var j=JSON.parse(t.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));var cols=j.table.cols.map(function(c){return(c.label||c.id||'').trim();});return(j.table.rows||[]).map(function(r){var o={};(r.c||[]).forEach(function(cell,i){o[cols[i]]=cell&&cell.v!=null?String(cell.v).trim():'';});return o;}).filter(function(r){return Object.values(r).some(function(v){return v;});});}
async function loadAll(){setStatus('ld','جاري تحميل البيانات...');try{setLMsg('تحميل dashboard...');DB.dash=await gviz(DASH);setLMsg('تحميل Technical Visit Form...');try{DB.tvf=await gviz(TVF);}catch(e){DB.tvf=[];}setLMsg('تحميل stock...');try{DB.stock=await gviz(STOCK);}catch(e){DB.stock=[];}try{DB.sim55=await gviz(SIM55);}catch(e){DB.sim55=[];}loaded=true;setStatus('ok','جاهز — '+DB.dash.length+' dashboard · '+DB.tvf.length+' TVF · '+DB.stock.length+' stock | '+new Date().toLocaleTimeString('ar'));}catch(e){setStatus('err','فشل: '+e.message);}}
function setStatus(s,m){var d=document.getElementById('stDot');d.className='dot '+(s==='ok'?'ok':s==='err'?'err':'ld');document.getElementById('stMsg').textContent=m;}
function setLMsg(m){document.getElementById('lmsg').textContent=m;}
function sim(a,b){a=(a||'').toLowerCase().replace(/\s+/g,' ').trim();b=(b||'').toLowerCase().replace(/\s+/g,' ').trim();if(a===b)return 1;if(!a||!b)return 0;if(a.includes(b)||b.includes(a))return 0.9;var wa=a.split(' '),wb=b.split(' '),ws={};wa.forEach(function(w){ws[w]=1;});var com=wb.filter(function(w){return w.length>1&&ws[w];}).length;if(com>0)return 0.65+com/Math.max(wa.length,wb.length)*0.25;var lo=a.length>b.length?a:b,sh=a.length>b.length?b:a,c=[];for(var i=0;i<=sh.length;i++){var lv=i;for(var j2=1;j2<=lo.length;j2++){if(i===0){c[j2]=j2;continue;}var nv=c[j2-1];if(sh[i-1]!==lo[j2-1])nv=Math.min(Math.min(nv,lv),c[j2])+1;c[j2-1]=lv;lv=nv;}c[lo.length]=lv;}return(lo.length-c[lo.length])/lo.length;}
function pd(s){if(!s)return new Date(0);var ar={'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};s=s.replace(/[٠-٩]/g,function(d){return ar[d];}).replace(/\u200f/g,'').trim();var m=s.match(/(\d+)\/(\d+)\/(\d+)/);if(!m)return new Date(0);var t=s.match(/(\d+):(\d+)/),h=t?parseInt(t[1]):0,mn=t?parseInt(t[2]):0;var y=parseInt(m[3]),mo=parseInt(m[2]),d=parseInt(m[1]);if(y<100){var tmp=y;y=d;d=tmp;}if(s.includes('م')&&h<12)h+=12;if(s.includes('ص')&&h===12)h=0;return new Date(y,mo-1,d,h,mn);}
function cv(r){for(var i=1;i<arguments.length;i++){var k=arguments[i];if(r&&r[k]!==undefined&&r[k]!=='')return r[k];}return'';}
function nd(d){return(d||'').toLowerCase().replace(/[\s\-]/g,'');}
function ns(s){return(s||'').replace(/\s/g,'').replace(/^00964/,'').replace(/^964/,'').replace(/^0/,'').slice(-9);}
function go(){var q=document.getElementById('si').value.trim();if(!q)return;if(!loaded){loadAll().then(function(){if(loaded)go();});return;}hideErr();showLoad(true);setTimeout(function(){if(mode==='r')byR(q);else if(mode==='d')byD(q);else byS(q);showLoad(false);},10);}
function byR(q){
  var dScored=DB.dash.filter(function(r){return cv(r,'اسم المطعم');}).map(function(r){return{r:r,name:cv(r,'اسم المطعم'),sc:sim(cv(r,'اسم المطعم'),q)};}).filter(function(x){return x.sc>0.35;}).sort(function(a,b){return b.sc-a.sc;});
  var tvfScored=DB.tvf.map(function(r){var names=[cv(r,'اسم المطعم'),cv(r,'اسم الوظف')];var best=0,bestN='';names.forEach(function(n){if(n){var s=sim(n,q);if(s>best){best=s;bestN=n;}}});return{r:r,name:bestN,sc:best};}).filter(function(x){return x.sc>0.4;}).sort(function(a,b){return b.sc-a.sc;});
  if(!dScored.length&&!tvfScored.length){noRes(q);return;}
  var dBest=dScored.length?dScored[0].sc:0,tBest=tvfScored.length?tvfScored[0].sc:0;
  var best=Math.max(dBest,tBest),thr=Math.max(0.5,best*0.72);
  var dashTasks=dScored.filter(function(x){return x.sc>=thr;}).map(function(x){return x.r;}).sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});
  var tvfTasks=tvfScored.filter(function(x){return x.sc>=thr;}).map(function(x){return x.r;}).sort(function(a,b){return pd(cv(b,'Timestamp'))-pd(cv(a,'Timestamp'));});
  var mName=(dScored.length&&dScored[0].sc>=tBest)?dScored[0].name:tvfScored.length?tvfScored[0].name:q;
  render(dashTasks,tvfTasks,best<0.88?'تم مطابقة "'+mName+'" مع "'+q+'" ('+Math.round(best*100)+'% تشابه)':'');
}
function byD(q){var ql=nd(q);var dashTasks=DB.dash.filter(function(r){var d=nd(cv(r,'رقم جهاز POS'));return d&&d.length>4&&(d.includes(ql)||ql.includes(d.substring(0,8)));}).sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});var tvfTasks=DB.tvf.filter(function(r){var d=nd(cv(r,'رقم الجهاز'));return d&&d.length>4&&(d.includes(ql)||ql.includes(d.substring(0,8)));}).sort(function(a,b){return pd(cv(b,'Timestamp'))-pd(cv(a,'Timestamp'));});var sm=DB.stock.filter(function(r){var v=nd(cv(r,'vs','VS'));return v&&v.length>4&&(v.includes(ql)||ql.includes(v.substring(0,8)));});var note=sm.length?'في stock: '+cv(sm[0],'rest name','REST NAME')+' — '+cv(sm[0],'status'):'';if(!dashTasks.length&&!tvfTasks.length&&!sm.length){noRes(q);return;}render(dashTasks,tvfTasks,note);}
function byS(q){var nq=ns(q);var dashTasks=DB.dash.filter(function(r){return ns(cv(r,'رقم SIM كارت POS'))===nq;}).sort(function(a,b){return pd(cv(b,'submittedAt'))-pd(cv(a,'submittedAt'));});var tvfTasks=DB.tvf.filter(function(r){return ns(cv(r,'رقم السم كارت','رقم السيم كارت'))===nq;}).sort(function(a,b){return pd(cv(b,'Timestamp'))-pd(cv(a,'Timestamp'));});var sm=DB.sim55.filter(function(r){return ns(cv(r,'ارقام'))===nq;})[0];if(!dashTasks.length&&!tvfTasks.length&&!sm){noRes(q);return;}var note=sm?'في sim55: '+cv(sm,'اسم المطعم')+' — '+cv(sm,'الحالة'):'';render(dashTasks,tvfTasks,note);}
function vi(r){r=r||'';return r.includes('صيانة')?'🔧':r.includes('توزيع')?'📦':r.includes('تعويض')||r.includes('تبديل')?'🔄':r.includes('جديد')?'🆕':r.includes('راجع')?'↩️':r.includes('استعلام')?'❓':r.includes('حساب')?'💰':'📋';}
function sc3(s){var m={'نشط':'s-n','جديد':'s-j','انتظار':'s-w','مكتمل':'s-n'};return m[s]||'s-x';}
function ib(ico,lbl,val,cls,sp){if(!val||val==='—'||val===''||['1','2','3','9'].indexOf((val||'').trim())>=0)return'';var vc=val==='4G'?'g':val==='غير فعال'?'r':val==='3G'?'y':'';return'<div class="ib '+(cls==='p'?'hlp':cls?'hl':'')+(sp?' s2':'')+'"><div class="il">'+ico+' '+lbl+'</div><div class="iv '+(cls||vc)+'">'+val+'</div></div>';}
function render(dashTasks,tvfTasks,note){
  var td=dashTasks.length,tt=tvfTasks.length;
  if(!td&&!tt){noRes('');return;}
  var h='<div class="sumbar">';
  if(td)h+='📊 '+td+' تاسك في dashboard';
  if(td&&tt)h+=' · ';
  if(tt)h+='📋 '+tt+' سجل في TVF';
  if(note)h+='<span style="color:#f59e0b;font-size:11px"> ⚠️'+note+'</span>';
  h+='</div>';
  if(td){
    var t=dashTasks[0];
    var name=cv(t,'اسم المطعم'),addr=cv(t,'العنوان'),dev=cv(t,'رقم جهاز POS'),sim2=cv(t,'رقم SIM كارت POS'),reason=cv(t,'سبب الزيارة'),pos=cv(t,'جهاز POS'),simst=cv(t,'حالة SIM'),maint=cv(t,'صيانة POS'),notes=cv(t,'ملاحظات'),tech=cv(t,'اسم الموظف المسؤول'),status=cv(t,'status'),date=cv(t,'submittedAt'),callc=cv(t,'هل التاسك عن طريق الكول سنتر'),comp=cv(t,'منافس'),id=cv(t,'id');
    h+='<div class="sec blue">📊 آخر تاسك — dashboard</div>';
    h+='<div class="card"><div class="ch"><div style="font-size:20px;flex-shrink:0">'+vi(reason)+'</div><div style="flex:1"><div class="cname">'+name+'</div><div class="cmeta">📍'+addr+' · 📅'+date+' · 👤'+tech+'</div></div><div class="bdgs"><span class="bdg '+sc3(status)+'">'+(status||'—')+'</span><span class="bdg bnew">⚡آخر</span></div></div>'+(reason?'<div class="vb">'+vi(reason)+' '+reason+(callc?' | كول سنتر: '+callc:'')+'</div>':'')+'<div class="grid">'+ib('🖥️','رقم الجهاز POS',dev,'b')+ib('📶','رقم السيم',sim2)+ib('📡','حالة السيم',simst)+ib('🔧','نوع الصيانة',maint)+ib('🖨️','نوع الجهاز',pos)+(comp&&comp!=='—'?ib('📱','المنافس',comp):'')+'</div>'+(notes&&notes.trim()&&notes!=='—'?'<div class="nb"><div class="nl">📝 ملاحظات</div><div class="nt">'+notes+'</div></div>':'')+'<div class="cf">🆔 '+id+'</div></div>';
    if(td>1){h+='<button class="hbtn" onclick="tgl(this,\'dList\')">▼ باقي تاسكات dashboard ('+(td-1)+')</button><div id="dList" style="display:none">';for(var i=1;i<td;i++){var ht=dashTasks[i],hdev=cv(ht,'رقم جهاز POS'),hsm=cv(ht,'رقم SIM كارت POS');h+='<div class="hi"><div class="hr2"><span>'+vi(cv(ht,'سبب الزيارة'))+'</span><span style="font-size:13px;font-weight:700;color:#e2e8f0">'+cv(ht,'اسم المطعم')+'</span><span style="font-size:11px;color:#475569">📅'+cv(ht,'submittedAt')+'</span><span style="font-size:11px;color:#475569">👤'+cv(ht,'اسم الموظف المسؤول')+'</span>'+(hdev&&['1','2','3'].indexOf(hdev)<0?'<span style="font-size:11px;color:#60a5fa">🖥️'+hdev+'</span>':'')+'<span class="bdg '+sc3(cv(ht,'status'))+'" style="margin-right:auto;padding:2px 8px;border-radius:12px;font-size:10px">'+(cv(ht,'status')||'')+'</span></div>'+(cv(ht,'ملاحظات')&&cv(ht,'ملاحظات')!=='—'?'<div class="hno">'+cv(ht,'ملاحظات')+'</div>':'')+'</div>';}h+='</div>';}
  }
  if(tt){
    var tv=tvfTasks[0],tvName=cv(tv,'اسم المطعم','اسم الوظف'),tvDev=cv(tv,'رقم الجهاز'),tvSim=cv(tv,'رقم السم كارت','رقم السيم كارت'),tvOp=cv(tv,'توزيع /راجاع'),tvNote=cv(tv,'ملاحظة','ملاحظات'),tvDate=cv(tv,'Timestamp'),tvArea=cv(tv,'المنطقة',''),tvSim2=cv(tv,'حالة SIM','');

    if(tt>1){h+='<button class="hbtn" style="border-color:rgba(139,92,246,.2)" onclick="tgl(this,\'tList\')">▼ باقي سجلات TVF ('+(tt-1)+')</button><div id="tList" style="display:none">';for(var k=1;k<tt;k++){var tr=tvfTasks[k];h+='<div class="hi" style="border-color:rgba(139,92,246,.15)"><div class="hr2"><span>'+vi(cv(tr,'توزيع /راجاع'))+'</span><span style="font-size:13px;font-weight:700;color:#e2e8f0">'+cv(tr,'اسم المطعم','اسم الوظف')+'</span><span style="font-size:11px;color:#475569">📅'+cv(tr,'Timestamp')+'</span><span style="font-size:11px;color:#c4b5fd">🖥️'+cv(tr,'رقم الجهاز')+'</span>'+(cv(tr,'المنطقة')?'<span style="font-size:10px;color:#7c3aed;margin-right:auto">📍'+cv(tr,'المنطقة')+'</span>':'<span style="margin-right:auto"></span>')+'<span style="font-size:10px;color:#8b5cf6">'+cv(tr,'توزيع /راجاع')+'</span></div>'+(cv(tr,'ملاحظة')?'<div class="hno">'+cv(tr,'ملاحظة')+'</div>':'')+'</div>';}h+='</div>';}
  }
  document.getElementById('res').innerHTML=h;
}
